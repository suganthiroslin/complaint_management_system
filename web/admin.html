<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">Admin Panel</div>

<div class="container">

<div class="card">

<h2>Update Complaint Status</h2>

<form method="post" action="/updateStatus">

<label>Complaint ID</label>
<input name="id">

<label>Status</label>
<select name="status">
    <option>Pending</option>
    <option>In Progress</option>
    <option>Resolved</option>
</select>

<button>Update</button>

</form>

</div>

<div class="card">

<h2>All Complaints</h2>

<div id="allComplaints">
Loading complaints...
</div>

</div>

</div>

<script>
fetch("/getAllComplaints")
.then(r => r.text())
.then(data => {
    document.getElementById("allComplaints").innerHTML = data;
});
</script>

</body>
</html>
